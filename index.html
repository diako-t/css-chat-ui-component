<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-box">
        <div class="chat-item">
            <p>Hello! How are you?</p>
        </div>
        <div class="chat-item">
            <p>I am working on a new CSS component.</p>
        </div>
        <div class="answer-item">
            <p>That sounds great!</p>
        </div>
        <div class="answer-item">
            <p>Show me the result when it's done.</p>
        </div>
    </div>
</body>
</html>
